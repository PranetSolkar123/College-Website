<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCET Redesign</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">VCET<span>.</span></div>
    <nav>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Departments</a></li>
        <li><a href="#">Placements</a></li>
        <li><a href="#">Events</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <div class="menu-toggle">☰</div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="overlay">
      <h1>Shaping Future Engineers</h1>
      <p>Autonomous | NBA Accredited | Mumbai University</p>
      <div class="buttons">
        <button class="btn-primary">Apply Now</button>
        <button class="btn-secondary">Explore Courses</button>
      </div>
    </div>
  </section>

  <section class="stats">
  <div class="stat">
    <h2 class="count" data-target="5000">0</h2>
    <p>Students</p>
  </div>
  <div class="stat">
    <h2 class="count" data-target="100">0</h2>
    <p>Recruiters</p>
  </div>
  <div class="stat">
    <h2 class="count" data-target="241">0</h2>
    <p>Placements</p>
  </div>
  <div class="stat">
    <h2 class="count" data-target="25">0</h2>
    <p>Awards</p>
  </div>
</section>

<section class="departments">
  <h2>Our Departments</h2>
  <div class="dept-container">

    <div class="card">
      <h3>Computer Engineering</h3>
    </div>

    <div class="card">
      <h3>AI & Data Science</h3>
    </div>

    <div class="card">
      <h3>EXTC</h3>
    </div>

    <div class="card">
      <h3>Mechanical</h3>
    </div>

  </div>
</section>

  <script src="script.js"></script>
</body>
</html>
